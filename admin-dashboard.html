<script>
window.supabaseClient=window.supabase.createClient("https://lgxnejnihodyfgxlyycd.supabase.co","eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxneG5lam5paG9keWZneGx5eWNkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE0NDg2NTcsImV4cCI6MjA4NzAyNDY1N30.3l1LlRMJRFsjDUIOXjkGqy01y4y_SZw6A4KFyVTJAFo");
window.requireAuth=async function(){
  var r=await window.supabaseClient.auth.getUser();
  if(!r.data||!r.data.user){location.href="login.html";return null;}
  return r.data.user;
};
window.getProfileSafe=async function(uid){
  var r=await window.supabaseClient.from("profiles").select("subscription_status,subscription_tier").eq("id",uid).maybeSingle();
  return r.data||{subscription_status:"inactive",subscription_tier:"none"};
};
window.logout=async function(){
  await window.supabaseClient.auth.signOut();
  location.href="index.html";
};
window.checkout=async function(plan){
  var r=await window.supabaseClient.auth.getSession();
  var token=r.data&&r.data.session&&r.data.session.access_token;
  if(!token){location.href="login.html";return;}
  var btn=window.event&&window.event.target;
  if(btn&&btn.tagName==="BUTTON"){btn.disabled=true;btn.textContent="Redirection...";}
  fetch("/api/create-checkout-session",{
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":"Bearer "+token},
    body:JSON.stringify({plan:plan})
  }).then(function(res){return res.json();})
  .then(function(d){
    if(d.url){location.href=d.url;}
    else{alert(d.error||"Erreur paiement");if(btn)btn.disabled=false;}
  }).catch(function(e){alert("Erreur: "+e.message);if(btn)btn.disabled=false;});
};
</script>
<script>
(async()=>{
  const user = await requireAuth();
  if(!user) return;
(async()=>{
  try{
    const {data:profiles} = await supabaseClient.from('profiles').select('*');
    const members = profiles?.filter(p=>p.subscription_tier==='member'&&p.subscription_status==='active').length||0;
    const vip = profiles?.filter(p=>p.subscription_tier==='vip'&&p.subscription_status==='active').length||0;
    const revenue = (members*17+vip*60).toFixed(0);
    const d7 = new Date(); d7.setDate(d7.getDate()-7);
    const newU = profiles?.filter(p=>new Date(p.created_at)>d7).length||0;
    document.getElementById('stats').innerHTML = `
      <div class="stat-card"><div class="stat-value">${members}</div><div class="stat-label">Members Actifs</div></div>
      <div class="stat-card"><div class="stat-value">${vip}</div><div class="stat-label">VIP Actifs</div></div>
      <div class="stat-card"><div class="stat-value">${revenue} €</div><div class="stat-label">Revenus mois</div></div>
      <div class="stat-card"><div class="stat-value">${newU}</div><div class="stat-label">Nouveaux 7j</div></div>`;
  }catch(e){ console.error(e); }
})();
})();
</script>
