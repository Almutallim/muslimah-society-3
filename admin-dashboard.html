<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Admin — Muslimah Society</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Playfair+Display:wght@400;500;600&family=Cormorant+Garamond:wght@300;400;500;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{
  --ivory:#fdf8f2;--cream:#faf4ec;--blush:#ead8d2;--blush-light:#f5ece8;
  --rose:#cda9a0;--rose-deep:#b48a82;--gold:#c9a84c;--gold-soft:#edd8a6;
  --text:#3f2d26;--text-soft:#7d6055;--text-faint:#a48a7d;
  --shadow:0 18px 48px rgba(90,65,52,.12);--radius:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Cormorant Garamond',serif;color:var(--text);background:linear-gradient(to bottom,var(--ivory),var(--cream));min-height:100vh;}
a{text-decoration:none;color:inherit}
button{font:inherit;cursor:pointer}

/* HEADER */
.ms-header{
  position:sticky;top:0;z-index:50;
  display:flex;align-items:center;justify-content:space-between;gap:24px;
  padding:18px 42px;
  background:rgba(253,248,242,.95);backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(201,168,76,.18);
}
.ms-logo{display:flex;align-items:center;gap:12px}
.ms-logo-mono{
  width:44px;height:44px;border-radius:50%;display:grid;place-items:center;
  border:1.5px solid var(--gold);color:var(--gold);font-family:'Cinzel',serif;font-size:13px;
  background:radial-gradient(circle,rgba(255,248,238,.98),rgba(240,228,200,.55));
}
.ms-logo-name{font-family:'Cinzel',serif;font-size:14px;letter-spacing:3px}
.ms-nav{display:flex;align-items:center;gap:16px}
.btn-outline{
  border-radius:40px;padding:9px 22px;border:1.5px solid var(--gold);
  color:var(--gold);background:transparent;font-size:15px;font-style:italic;
  display:inline-flex;align-items:center;transition:.25s;
}
.btn-outline:hover{background:var(--gold);color:#fff}
.btn-solid{
  border-radius:40px;padding:9px 22px;border:1.5px solid var(--rose-deep);
  background:var(--rose-deep);color:#fff;font-size:15px;font-style:italic;
  display:inline-flex;align-items:center;transition:.25s;
}
.btn-solid:hover{background:var(--rose);border-color:var(--rose)}

/* HERO ADMIN */
.admin-hero{
  padding:52px 42px 44px;
  background:linear-gradient(160deg,var(--blush-light),var(--blush),#f0e3df);
  text-align:center;border-bottom:1px solid rgba(201,168,76,.15);
}
.admin-eyebrow{
  display:inline-block;font-family:'Cinzel',serif;font-size:10px;letter-spacing:4px;
  text-transform:uppercase;color:var(--gold);border:1px solid rgba(201,168,76,.3);
  border-radius:20px;padding:5px 18px;margin-bottom:16px;background:rgba(255,252,248,.8);
}
.admin-title{font-family:'Playfair Display',serif;font-size:clamp(26px,4vw,40px);margin-bottom:8px}
.admin-sub{font-size:18px;font-style:italic;color:var(--text-soft)}

/* CONTENU */
.admin-body{max-width:1100px;margin:0 auto;padding:48px 42px 72px}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:32px}
.stat-box{
  background:rgba(255,252,248,.95);border:1.5px solid rgba(201,168,76,.22);
  border-radius:var(--radius);padding:28px 24px;text-align:center;box-shadow:var(--shadow);
}
.stat-num{font-family:'Playfair Display',serif;font-size:38px;color:var(--gold);margin-bottom:8px}
.stat-lbl{font-family:'Cinzel',serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--text-soft)}

/* ACTIONS */
.admin-actions{display:flex;gap:14px;flex-wrap:wrap;margin-top:4px}
.btn-admin{
  display:inline-flex;align-items:center;gap:8px;padding:12px 26px;border-radius:40px;
  font-family:'Cormorant Garamond',serif;font-size:16px;font-style:italic;
  border:1.5px solid transparent;transition:.25s;
}
.btn-admin-gold{background:var(--gold);border-color:var(--gold);color:#fff}
.btn-admin-gold:hover{background:var(--gold-soft);color:var(--text)}
.btn-admin-ghost{background:transparent;border-color:rgba(201,168,76,.4);color:var(--text-soft)}
.btn-admin-ghost:hover{background:var(--gold);border-color:var(--gold);color:#fff}

/* FOOTER */
.ms-footer{
  padding:32px 42px;
  background:linear-gradient(to bottom,#ede3dc,#e4d8d0);
  border-top:1px solid rgba(201,168,76,.18);
}
.footer-min{
  max-width:1100px;margin:0 auto;
  display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;
}
.fcopy{font-size:13px;font-style:italic;color:var(--text-faint)}
.flegal{display:flex;gap:16px}
.flegal a{font-size:13px;font-style:italic;color:var(--text-faint)}
.flegal a:hover{color:var(--gold)}

@media(max-width:900px){.stats-grid{grid-template-columns:1fr 1fr}}
@media(max-width:600px){
  .ms-header{padding:16px 20px}
  .admin-hero,.admin-body{padding-left:20px;padding-right:20px}
  .stats-grid{grid-template-columns:1fr}
  .ms-nav .btn-outline{display:none}
}

/* ── compat classes ── */
.chip{display:inline-block;font-family:'Cinzel',serif;font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);border:1px solid rgba(201,168,76,.3);border-radius:20px;padding:5px 18px;margin-bottom:16px;background:rgba(255,252,248,.8)}
.hero-title{font-family:'Playfair Display',serif;font-size:clamp(24px,4vw,44px);color:var(--text);margin-bottom:10px;letter-spacing:2px}
.hero-sub{font-size:18px;font-style:italic;color:var(--text-soft)}
.page{padding:52px 42px 72px}
.plan{background:rgba(255,252,248,.95);border:1.5px solid rgba(201,168,76,.24);border-radius:var(--radius);padding:0;box-shadow:var(--shadow);width:340px;overflow:hidden;transition:.3s}
.plan:hover{transform:translateY(-4px)}
.plan.featured{border-color:var(--gold)}
.plan-head{background:linear-gradient(160deg,var(--blush-light),rgba(255,252,248,.85));padding:28px 28px 22px;border-bottom:1px solid rgba(201,168,76,.15)}
.plan-badge{display:inline-block;font-family:'Cinzel',serif;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);border:1px solid rgba(201,168,76,.3);padding:4px 14px;border-radius:20px;margin-bottom:12px}
.plan-badge.vip{background:var(--gold);color:#fff;border-color:var(--gold)}
.plan-name{font-family:'Playfair Display',serif;font-size:34px;color:var(--text);margin-bottom:4px}
.plan-desc{font-size:16px;font-style:italic;color:var(--text-soft);margin-bottom:16px}
.plan-amount{font-family:'Playfair Display',serif;font-size:42px;color:var(--gold)}
.plan-period{font-size:15px;color:var(--text-soft);margin-left:4px}
.plan-alt{font-size:13px;font-style:italic;color:var(--text-faint);margin-top:4px}
.plan-body{padding:24px 28px 28px}
.plan-body ul{list-style:none;margin:0 0 22px 0}
.plan-body li{font-size:16px;line-height:1.85;color:var(--text-soft);padding-left:18px;position:relative}
.plan-body li::before{content:'✦';position:absolute;left:0;color:var(--gold);font-size:8px;top:7px}
.btn-plan{display:block;width:100%;padding:13px;border-radius:40px;font-family:'Cormorant Garamond',serif;font-size:17px;font-style:italic;cursor:pointer;transition:.25s;border:1.5px solid transparent}
.btn-member{background:transparent;border-color:var(--gold);color:var(--gold)}
.btn-member:hover{background:var(--gold);color:#fff}
.btn-vip-plan{background:var(--rose-deep);border-color:var(--rose-deep);color:#fff}
.btn-vip-plan:hover{background:var(--rose);border-color:var(--rose)}
.pricing-note{text-align:center;margin-top:24px;font-size:14px;font-style:italic;color:var(--text-faint)}
.text-content{max-width:820px;margin:0 auto;padding:52px 42px}
.text-content h2{font-family:'Playfair Display',serif;font-size:22px;color:var(--text);margin:24px 0 10px}
.text-content h3{font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin:18px 0 8px}
.text-content p{font-size:17px;line-height:1.85;color:var(--text-soft);margin-bottom:14px}
.text-content ul{margin:0 0 14px 18px}
.text-content li{font-size:17px;line-height:1.85;color:var(--text-soft)}
.text-content .note{background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.2);border-radius:4px;padding:12px 16px;margin:16px 0;font-style:italic;color:var(--text-soft)}
.card-body{padding:8px 0}
.card-body h2{font-family:'Playfair Display',serif;font-size:20px;color:var(--text);margin:20px 0 8px}
.card-body h3{font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin:14px 0 6px}
.card-body p{font-size:17px;line-height:1.85;color:var(--text-soft);margin-bottom:12px}
.card-body ul{margin:0 0 14px 18px}
.card-body li{font-size:17px;line-height:1.85;color:var(--text-soft)}
.card-body .note{background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.2);padding:12px 16px;margin:12px 0;border-radius:4px;font-style:italic;color:var(--text-soft)}

</style>
</head>
<body>

<header class="ms-header">
  <a class="ms-logo" href="index.html">
    <div class="ms-logo-mono">MS</div>
    <div class="ms-logo-name">MUSLIMAH SOCIETY</div>
  </a>
  <nav class="ms-nav">
    <a class="btn-outline" href="pricing.html">Abonnements</a>
    <a class="btn-solid" href="dashboard.html">Mon espace</a>
  </nav>
</header>

<div class="admin-hero">
  <div class="admin-eyebrow">Administration</div>
  <h1 class="admin-title">Tableau de bord</h1>
  <p class="admin-sub">Vue d'ensemble — données en temps réel</p>
</div>

<main class="admin-body">
  <div class="stats-grid" id="stats">
    <div class="stat-box"><div class="stat-num" id="statMembers">—</div><div class="stat-lbl">Members Actifs</div></div>
    <div class="stat-box"><div class="stat-num" id="statVip">—</div><div class="stat-lbl">VIP Actifs</div></div>
    <div class="stat-box"><div class="stat-num" id="statRevenue">—</div><div class="stat-lbl">Revenus mois</div></div>
    <div class="stat-box"><div class="stat-num" id="statNew">—</div><div class="stat-lbl">Nouveaux 7j</div></div>
  </div>
  <div class="admin-actions">
    <a class="btn-admin btn-admin-gold" href="admin-users.html">✦ Gérer les utilisateurs</a>
    <a class="btn-admin btn-admin-ghost" href="pricing.html">Abonnements</a>
    <a class="btn-admin btn-admin-ghost" href="dashboard.html">Mon espace</a>
  </div>
</main>

<footer class="ms-footer">
  <div class="footer-min">
    <span class="fcopy">© 2026 Institut Al Muta'allim — Muslimah Society</span>
    <div class="flegal">
      <a href="index.html">Accueil</a>
      <a href="privacy.html">Confidentialité</a>
      <a href="terms.html">CGU</a>
    </div>
  </div>
</footer>

  try{
    const {data,error} = await sb.from('profiles').select('role,created_at');

    const now = new Date(), sevenDaysAgo = new Date(now-7*86400000);

</body>
</html>
