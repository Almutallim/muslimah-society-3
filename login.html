<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Connexion — Muslimah Society</title>
  <link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
<div class="card">
  <div class="card-head">
    <div class="logo-mark"><span>MS</span></div>
    <h1>Connexion</h1>
    <p>Bienvenue dans votre espace</p>
  </div>
  <div class="card-body">
    <div class="field">
      <label for="email">Adresse e-mail</label>
      <input type="email" id="email" placeholder="votre@email.com" autocomplete="email"/>
    </div>
    <div class="field">
      <label for="password">Mot de passe</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="btn-submit" id="loginBtn" onclick="doLogin()">Se connecter</button>
    <div class="msg" id="msg"></div>
    <div class="orn">
      <svg width="160" height="14" viewBox="0 0 160 14" fill="none">
        <line x1="0" y1="7" x2="60" y2="7" stroke="#c9a84c" stroke-width=".7" opacity=".4"/>
        <circle cx="80" cy="7" r="3.5" fill="none" stroke="#c9a84c" stroke-width=".8" opacity=".5"/>
        <circle cx="80" cy="7" r="1.2" fill="#c9a84c" opacity=".5"/>
        <line x1="100" y1="7" x2="160" y2="7" stroke="#c9a84c" stroke-width=".7" opacity=".4"/>
      </svg>
    </div>
    <div class="footer-links">
      Pas encore membre ? <a href="register.html">Rejoindre la Maison</a><br>
      <a href="index.html" style="font-size:13px;color:var(--text-l);">← Retour au site</a>
    </div>
  </div>
</div>

<script>
var _U="https://lgxnejnihodyfgxlyycd.supabase.co";
var _K="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxneG5lam5paG9keWZneGx5eWNkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE0NDg2NTcsImV4cCI6MjA4NzAyNDY1N30.3l1LlRMJRFsjDUIOXjkGqy01y4y_SZw6A4KFyVTJAFo";

function showMsg(text,type){
  var m=document.getElementById("msg");
  m.textContent=text; m.className="msg "+type; m.style.display="block";
}

function doLogin(){
  var email=document.getElementById("email").value.trim();
  var pwd=document.getElementById("password").value;
  var btn=document.getElementById("loginBtn");
  if(!email||!pwd){showMsg("Veuillez remplir tous les champs.","error");return;}
  btn.disabled=true; btn.textContent="Connexion...";
  var c=window.supabase.createClient(_U,_K);
  c.auth.signInWithPassword({email:email,password:pwd})
    .then(function(r){
      if(r.error){showMsg(r.error.message,"error");btn.disabled=false;btn.textContent="Se connecter";return;}
      showMsg("Connexion reussie — redirection...","success");
      setTimeout(function(){location.href="dashboard.html";},1000);
    })
    .catch(function(e){showMsg(e.message||"Erreur.","error");btn.disabled=false;btn.textContent="Se connecter";});
}

document.addEventListener("keydown",function(e){if(e.key==="Enter")doLogin();});
</script>
</body>
</html>
