<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Connexion — Muslimah Society</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
:root{--gold:#c9a84c;--gold-p:#f0e4c0;--blush:#e8d5d0;--blush-l:#f5ede9;--ivory:#fdf8f2;--text:#3d2b25;--text-m:#7a5a50;--text-l:#a89080;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Cormorant Garamond',serif;background:linear-gradient(155deg,var(--blush-l),var(--blush) 50%,#e8e2f0);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.card{width:min(420px,100%);background:rgba(253,248,242,.97);border:1px solid rgba(201,168,76,.22);border-radius:4px;box-shadow:0 24px 64px rgba(61,43,37,.14);overflow:hidden;position:relative;}
.card::before{content:'';position:absolute;top:8px;left:8px;width:16px;height:16px;border-top:1px solid var(--gold-p);border-left:1px solid var(--gold-p);}
.card::after{content:'';position:absolute;bottom:8px;right:8px;width:16px;height:16px;border-bottom:1px solid var(--gold-p);border-right:1px solid var(--gold-p);}
.card-head{padding:32px 28px 24px;background:linear-gradient(155deg,rgba(232,213,208,.45),rgba(216,208,228,.2));border-bottom:1px solid rgba(201,168,76,.14);text-align:center;}
.logo-mark{width:48px;height:48px;border-radius:50%;border:1.5px solid var(--gold);background:radial-gradient(circle at 35% 30%,rgba(255,252,245,1),rgba(240,228,200,.55));display:flex;align-items:center;justify-content:center;margin:0 auto 14px;box-shadow:0 0 14px rgba(201,168,76,.15);}
.logo-mark span{font-family:'Cinzel',serif;font-size:14px;font-weight:500;color:var(--gold);}
.card-head h1{font-family:'Cinzel',serif;font-size:20px;font-weight:500;letter-spacing:2px;color:var(--text);margin-bottom:6px;}
.card-head p{font-size:15px;font-style:italic;color:var(--text-m);}
.card-body{padding:28px 28px 32px;}
.field{margin-bottom:18px;}
.field label{display:block;font-family:'Cinzel',serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:8px;}
.field input{width:100%;padding:12px 16px;border:1px solid rgba(201,168,76,.25);border-radius:3px;background:rgba(255,252,245,.8);font-family:'Cormorant Garamond',serif;font-size:17px;color:var(--text);outline:none;transition:border-color .3s;}
.field input:focus{border-color:rgba(201,168,76,.6);background:#fff;}
.btn-submit{width:100%;padding:14px;border:none;border-radius:30px;background:var(--gold);color:#fff;font-family:'Cinzel',serif;font-size:13px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;margin-top:8px;transition:all .3s;}
.btn-submit:hover{background:#b8923e;box-shadow:0 10px 28px rgba(201,168,76,.25);}
.btn-submit:disabled{opacity:.6;cursor:not-allowed;}
.msg{padding:12px 16px;border-radius:3px;font-size:15px;font-style:italic;margin-top:14px;display:none;}
.msg.error{background:rgba(200,80,80,.08);border:1px solid rgba(200,80,80,.2);color:#8b3a3a;}
.msg.success{background:rgba(80,140,100,.08);border:1px solid rgba(80,140,100,.2);color:#3a6b4a;}
.footer-links{text-align:center;margin-top:20px;font-size:15px;font-style:italic;color:var(--text-m);}
.footer-links a{color:var(--gold);text-decoration:none;}
.footer-links a:hover{text-decoration:underline;}
.orn{display:flex;justify-content:center;padding:16px 0 0;}
  </style>
</head>
<body>
<div class="card">
  <div class="card-head">
    <div class="logo-mark"><span>MS</span></div>
    <h1>Connexion</h1>
    <p>Bienvenue dans votre espace</p>
  </div>
  <div class="card-body">
    <div class="field">
      <label for="email">Adresse e-mail</label>
      <input type="email" id="email" placeholder="votre@email.com" autocomplete="email"/>
    </div>
    <div class="field">
      <label for="password">Mot de passe</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="btn-submit" id="loginBtn" onclick="doLogin()">Se connecter</button>
    <div class="msg" id="msg"></div>
    <div class="orn">
      <svg width="160" height="14" viewBox="0 0 160 14" fill="none">
        <line x1="0" y1="7" x2="60" y2="7" stroke="#c9a84c" stroke-width=".7" opacity=".4"/>
        <circle cx="80" cy="7" r="3.5" fill="none" stroke="#c9a84c" stroke-width=".8" opacity=".5"/>
        <circle cx="80" cy="7" r="1.2" fill="#c9a84c" opacity=".5"/>
        <line x1="100" y1="7" x2="160" y2="7" stroke="#c9a84c" stroke-width=".7" opacity=".4"/>
      </svg>
    </div>
    <div class="footer-links">
      Pas encore membre ? <a href="register.html">Rejoindre la Maison</a><br>
      <a href="index.html" style="font-size:13px;color:var(--text-l);">← Retour au site</a>
    </div>
  </div>
</div>

<script src="js/supabaseClient.js"></script>
<script src="js/auth.js"></script>
<script>
async function doLogin(){
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');
  const msg = document.getElementById('msg');

  if(!email || !password){ showMsg('Veuillez remplir tous les champs.','error'); return; }

  btn.disabled = true;
  btn.textContent = 'Connexion…';
  msg.style.display = 'none';

  try{
    await login(email, password);
    showMsg('Connexion réussie — redirection…','success');
    setTimeout(()=> window.location.href = 'dashboard.html', 1000);
  }catch(e){
    showMsg(e.message || 'Erreur de connexion.','error');
    btn.disabled = false;
    btn.textContent = 'Se connecter';
  }
}

function showMsg(text, type){
  const msg = document.getElementById('msg');
  msg.textContent = text;
  msg.className = 'msg ' + type;
  msg.style.display = 'block';
}

// Enter key
document.addEventListener('keydown', e => { if(e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
