<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Mon Espace — Muslimah Society</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
:root{--gold:#c9a84c;--gold-p:#f0e4c0;--blush:#e8d5d0;--blush-l:#f5ede9;--ivory:#fdf8f2;--text:#3d2b25;--text-m:#7a5a50;--text-l:#a89080;--rose-d:#b08880;--max:900px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Cormorant Garamond',serif;background:var(--ivory);color:var(--text);}
a{color:inherit;text-decoration:none;}

/* Header */
.ms-header{position:sticky;top:0;z-index:800;background:linear-gradient(to bottom,rgba(253,248,242,.98),rgba(250,244,236,.95));border-bottom:1px solid var(--gold-p);backdrop-filter:blur(10px);}
.ms-header .inner{max-width:var(--max);margin:0 auto;padding:0 24px;height:68px;display:flex;align-items:center;justify-content:space-between;gap:14px;}
.ms-logo{display:flex;align-items:center;gap:10px;}
.ms-logo-mark{width:38px;height:38px;border-radius:50%;border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 35% 30%,rgba(255,252,245,1),rgba(240,228,200,.55));}
.ms-logo-mark span{font-family:'Cinzel',serif;font-size:12px;color:var(--gold);}
.ms-logo-name{font-family:'Cinzel',serif;font-size:12px;letter-spacing:3px;color:var(--text);}
.btn-logout{font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;padding:8px 16px;border-radius:20px;border:1px solid rgba(201,168,76,.3);color:var(--text-m);background:transparent;cursor:pointer;transition:all .3s;}
.btn-logout:hover{border-color:var(--gold);color:var(--gold);}

/* Page */
.page{max-width:var(--max);margin:0 auto;padding:32px 24px 64px;}

/* Hero utilisateur */
.user-hero{background:linear-gradient(155deg,rgba(232,213,208,.45),rgba(216,208,228,.25));border:1px solid rgba(201,168,76,.2);border-radius:4px;padding:28px 28px 24px;margin-bottom:24px;position:relative;}
.user-hero::before{content:'';position:absolute;top:6px;left:6px;width:14px;height:14px;border-top:1px solid var(--gold-p);border-left:1px solid var(--gold-p);}
.user-hero::after{content:'';position:absolute;bottom:6px;right:6px;width:14px;height:14px;border-bottom:1px solid var(--gold-p);border-right:1px solid var(--gold-p);}
.user-greeting{font-family:'Cinzel',serif;font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:8px;}
.user-email{font-size:20px;font-style:italic;color:var(--text-m);}
.badge-tier{display:inline-block;margin-top:10px;padding:6px 16px;border-radius:20px;font-family:'Cinzel',serif;font-size:9px;letter-spacing:3px;text-transform:uppercase;}
.badge-member{background:rgba(201,168,76,.12);color:#9a7830;border:1px solid rgba(201,168,76,.28);}
.badge-vip{background:rgba(176,136,128,.15);color:var(--rose-d);border:1px solid rgba(176,136,128,.28);}
.badge-none{background:rgba(160,144,128,.1);color:var(--text-l);border:1px solid rgba(160,144,128,.2);}

/* Cards accès rapide */
.grid{display:grid;grid-template-columns:1fr;gap:14px;margin-bottom:24px;}
@media(min-width:600px){.grid{grid-template-columns:repeat(2,1fr);}}
.access-card{background:rgba(255,252,248,.9);border:1px solid rgba(201,168,76,.2);border-radius:4px;padding:20px 22px;display:flex;flex-direction:column;gap:10px;transition:all .2s;position:relative;}
.access-card:hover{border-color:rgba(201,168,76,.5);box-shadow:0 12px 32px rgba(61,43,37,.1);transform:translateY(-1px);}
.access-card-icon{font-size:22px;}
.access-card-title{font-family:'Cinzel',serif;font-size:14px;font-weight:500;letter-spacing:1px;color:var(--text);}
.access-card-desc{font-size:15px;font-style:italic;color:var(--text-m);}
.access-card-link{font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-top:auto;}

/* Section */
.section-title{font-family:'Cinzel',serif;font-size:12px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid rgba(201,168,76,.2);}

/* Upgrade banner */
.upgrade-banner{background:linear-gradient(155deg,rgba(232,213,208,.3),rgba(216,208,228,.2));border:1px solid rgba(201,168,76,.2);border-radius:4px;padding:22px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-top:10px;}
.upgrade-text h3{font-family:'Cinzel',serif;font-size:15px;font-weight:500;letter-spacing:1px;margin-bottom:6px;}
.upgrade-text p{font-size:15px;font-style:italic;color:var(--text-m);}
.btn-upgrade{padding:10px 22px;border-radius:20px;background:var(--gold);color:#fff;border:none;font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;cursor:pointer;transition:all .3s;}
.btn-upgrade:hover{background:#b8923e;box-shadow:0 8px 24px rgba(201,168,76,.25);}
  </style>
</head>
<body>

<header class="ms-header">
  <div class="inner">
    <a class="ms-logo" href="index.html">
      <div class="ms-logo-mark"><span>MS</span></div>
      <div class="ms-logo-name">MUSLIMAH SOCIETY</div>
    </a>
    <button class="btn-logout" onclick="doLogout()">Déconnexion</button>
  </div>
</header>

<main class="page">

  <div class="user-hero">
    <div class="user-greeting">Espace personnel</div>
    <div class="user-email" id="userEmail">Chargement…</div>
    <div id="userBadge"><span class="badge-tier badge-none">…</span></div>
  </div>

  <div class="section-title">Accès rapide</div>
  <div class="grid" id="accessGrid">
    <!-- rempli par JS selon le tier -->
  </div>

  <div id="upgradeSection" style="display:none;">
    <div class="section-title">Rejoindre la Maison</div>
    <div class="upgrade-banner">
      <div class="upgrade-text">
        <h3>Accédez à la bibliothèque complète</h3>
        <p>30 chroniques des Sahabiyyat, audios exclusifs, soirées VIP…</p>
      </div>
      <button class="btn-upgrade" onclick="window.location.href='pricing.html'">Choisir mon abonnement</button>
    </div>
  </div>

</main>

<script src="js/supabaseClient.js"></script>
<script src="js/auth.js"></script>
<script src="js/gate.js"></script>
<script>
(async()=>{
  const user = await requireAuth();
  if(!user) return;

  document.getElementById('userEmail').textContent = user.email;

  let profile;
  try{ profile = await getProfileSafe(user.id); }
  catch(e){ profile = { subscription_status:'inactive', subscription_tier:'none' }; }

  const tier = profile.subscription_tier || 'none';
  const active = profile.subscription_status === 'active';

  // Badge
  const badge = document.getElementById('userBadge');
  if(active && tier === 'vip'){
    badge.innerHTML = '<span class="badge-tier badge-vip">✦ VIP</span>';
  } else if(active && tier === 'member'){
    badge.innerHTML = '<span class="badge-tier badge-member">Member</span>';
  } else {
    badge.innerHTML = '<span class="badge-tier badge-none">Sans abonnement</span>';
  }

  // Cards accès
  const grid = document.getElementById('accessGrid');
  const cards = [];

  cards.push({icon:'📜', title:'La Plume des Sahabiyyat', desc:'Bibliothèque des 30 chroniques', link:'la-plume/index.html'});

  if(active){
    cards.push({icon:'🎧', title:'Audios exclusifs', desc:'Messages & conférences privées', link:'audio.html'});
    if(tier === 'vip'){
      cards.push({icon:'✦', title:'Espace VIP', desc:'Soirées, replays & contenus réservés', link:'vip-events.html'});
    }
    cards.push({icon:'⚙️', title:'Mon abonnement', desc:'Gérer ma formule & facturation', link:'manage-subscription.html'});
  }

  cards.push({icon:'📋', title:'Charte officielle', desc:'Les engagements de la Maison', link:'charte.html'});

  grid.innerHTML = cards.map(c=>`
    
  `).join('');

  if(!active){
    document.getElementById('upgradeSection').style.display = 'block';
  }
})();

async function doLogout(){
  await logout();
}
</script>
</body>
</html>
