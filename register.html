<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Inscription — Muslimah Society</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
:root{--gold:#c9a84c;--gold-p:#f0e4c0;--blush:#e8d5d0;--blush-l:#f5ede9;--ivory:#fdf8f2;--text:#3d2b25;--text-m:#7a5a50;--text-l:#a89080;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Cormorant Garamond',serif;background:linear-gradient(155deg,var(--blush-l),var(--blush) 50%,#e8e2f0);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.card{width:min(460px,100%);background:rgba(253,248,242,.97);border:1px solid rgba(201,168,76,.22);border-radius:4px;box-shadow:0 24px 64px rgba(61,43,37,.14);overflow:hidden;position:relative;}
.card::before{content:'';position:absolute;top:8px;left:8px;width:16px;height:16px;border-top:1px solid var(--gold-p);border-left:1px solid var(--gold-p);}
.card::after{content:'';position:absolute;bottom:8px;right:8px;width:16px;height:16px;border-bottom:1px solid var(--gold-p);border-right:1px solid var(--gold-p);}
.card-head{padding:32px 28px 24px;background:linear-gradient(155deg,rgba(232,213,208,.45),rgba(216,208,228,.2));border-bottom:1px solid rgba(201,168,76,.14);text-align:center;}
.logo-mark{width:48px;height:48px;border-radius:50%;border:1.5px solid var(--gold);background:radial-gradient(circle at 35% 30%,rgba(255,252,245,1),rgba(240,228,200,.55));display:flex;align-items:center;justify-content:center;margin:0 auto 14px;box-shadow:0 0 14px rgba(201,168,76,.15);}
.logo-mark span{font-family:'Cinzel',serif;font-size:14px;font-weight:500;color:var(--gold);}
.card-head h1{font-family:'Cinzel',serif;font-size:20px;font-weight:500;letter-spacing:2px;color:var(--text);margin-bottom:6px;}
.card-head p{font-size:15px;font-style:italic;color:var(--text-m);}
.card-body{padding:28px 28px 32px;}
.field{margin-bottom:18px;}
.field label{display:block;font-family:'Cinzel',serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:8px;}
.field input{width:100%;padding:12px 16px;border:1px solid rgba(201,168,76,.25);border-radius:3px;background:rgba(255,252,245,.8);font-family:'Cormorant Garamond',serif;font-size:17px;color:var(--text);outline:none;transition:border-color .3s;}
.field input:focus{border-color:rgba(201,168,76,.6);background:#fff;}
.accept-row{display:flex;gap:12px;align-items:flex-start;padding:14px;border:1px solid rgba(201,168,76,.2);border-radius:3px;background:rgba(255,252,245,.7);margin-bottom:18px;}
.accept-row input[type="checkbox"]{width:18px;height:18px;margin-top:3px;accent-color:var(--gold);flex-shrink:0;cursor:pointer;}
.accept-row label{font-size:15px;font-style:italic;color:var(--text-m);line-height:1.6;cursor:pointer;}
.accept-row a{color:var(--gold);}
.btn-submit{width:100%;padding:14px;border:none;border-radius:30px;background:var(--gold);color:#fff;font-family:'Cinzel',serif;font-size:13px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:all .3s;}
.btn-submit:hover{background:#b8923e;box-shadow:0 10px 28px rgba(201,168,76,.25);}
.btn-submit:disabled{opacity:.6;cursor:not-allowed;}
.msg{padding:12px 16px;border-radius:3px;font-size:15px;font-style:italic;margin-top:14px;display:none;}
.msg.error{background:rgba(200,80,80,.08);border:1px solid rgba(200,80,80,.2);color:#8b3a3a;}
.msg.success{background:rgba(80,140,100,.08);border:1px solid rgba(80,140,100,.2);color:#3a6b4a;}
.footer-links{text-align:center;margin-top:20px;font-size:15px;font-style:italic;color:var(--text-m);}
.footer-links a{color:var(--gold);text-decoration:none;}
.orn{display:flex;justify-content:center;padding:16px 0 0;}
  </style>
</head>
<body>
<div class="card">
  <div class="card-head">
    <div class="logo-mark"><span>MS</span></div>
    <h1>Rejoindre la Maison</h1>
    <p>Créer votre compte Muslimah Society</p>
  </div>
  <div class="card-body">
    <div class="field">
      <label for="email">Adresse e-mail</label>
      <input type="email" id="email" placeholder="votre@email.com" autocomplete="email"/>
    </div>
    <div class="field">
      <label for="password">Mot de passe</label>
      <input type="password" id="password" placeholder="Minimum 8 caractères" autocomplete="new-password"/>
    </div>
    <div class="field">
      <label for="password2">Confirmer le mot de passe</label>
      <input type="password" id="password2" placeholder="••••••••" autocomplete="new-password"/>
    </div>
    <div class="accept-row">
      <input type="checkbox" id="acceptCharte"/>
      <label for="acceptCharte">J'ai lu et j'accepte la <a href="charte.html" target="_blank">Charte Officielle</a> de Muslimah Society et j'y adhère volontairement.</label>
    </div>
    <button class="btn-submit" id="registerBtn" onclick="doRegister()">Créer mon compte</button>
    <div class="msg" id="msg"></div>
    <div class="orn">
      <svg width="160" height="14" viewBox="0 0 160 14" fill="none">
        <line x1="0" y1="7" x2="60" y2="7" stroke="#c9a84c" stroke-width=".7" opacity=".4"/>
        <circle cx="80" cy="7" r="3.5" fill="none" stroke="#c9a84c" stroke-width=".8" opacity=".5"/>
        <circle cx="80" cy="7" r="1.2" fill="#c9a84c" opacity=".5"/>
        <line x1="100" y1="7" x2="160" y2="7" stroke="#c9a84c" stroke-width=".7" opacity=".4"/>
      </svg>
    </div>
    <div class="footer-links">
      Déjà membre ? <a href="login.html">Se connecter</a><br>
      <a href="index.html" style="font-size:13px;color:var(--text-l);">← Retour au site</a>
    </div>
  </div>
</div>

<script>
var _U="https://lgxnejnihodyfgxlyycd.supabase.co";
var _K="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxneG5lam5paG9keWZneGx5eWNkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE0NDg2NTcsImV4cCI6MjA4NzAyNDY1N30.3l1LlRMJRFsjDUIOXjkGqy01y4y_SZw6A4KFyVTJAFo";
function showMsg(t,type){var m=document.getElementById("msg");m.textContent=t;m.className="msg "+type;m.style.display="block";}
function doRegister(){
  var email=document.getElementById("email").value.trim();
  var pwd=document.getElementById("password").value;
  var pwd2=document.getElementById("password2").value;
  var charte=document.getElementById("acceptCharte").checked;
  var btn=document.getElementById("registerBtn");
  if(!email||!pwd){showMsg("Veuillez remplir tous les champs.","error");return;}
  if(pwd.length<8){showMsg("8 caracteres minimum.","error");return;}
  if(pwd!==pwd2){showMsg("Les mots de passe ne correspondent pas.","error");return;}
  if(!charte){showMsg("Vous devez accepter la Charte.","error");return;}
  btn.disabled=true;btn.textContent="Creation...";
  window.supabase.createClient(_U,_K).auth.signUp({email:email,password:pwd})
    .then(function(r){
      if(r.error){showMsg(r.error.message,"error");btn.disabled=false;btn.textContent="Creer mon compte";return;}
      showMsg("Compte cree ! Verifiez votre e-mail puis choisissez votre abonnement.","success");
      setTimeout(function(){location.href="pricing.html";},2500);
    }).catch(function(e){showMsg(e.message||"Erreur.","error");btn.disabled=false;btn.textContent="Creer mon compte";});
}
</script>
</body>
</html>
